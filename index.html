<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
<title>exercise snack!</title>
</head>
<body id="wrapper">
  <h1>Get on it!</h1>
  <h2 id="snack"></h2>
  <script> 
    function getRandomValue(array) {
        const randomIndex = Math.floor(Math.random() * array.length);
        return array[randomIndex];
    }

    function showSnack() {
      const exercise_collection = ["push-ups", "kb swings", "goblet squats", "pull-ups"];
      const count = Math.floor(Math.random() * (20 - 1) + 1);
      const exercise = getRandomValue(exercise_collection);
      console.log(exercise);
      const results = `Perform ${count} ${exercise}`;
      const elm = document.getElementById('snack');
      const d = document.createElement('div');
      d.innerText = results;
      elm.appendChild(d)
     }

      function setFont() {
       const fontType = [ "Jersey", "Roboto", "Helvetica", "Impact"];
       const num=Math.floor(Math.random()*3);
       document.getElementById("wrapper").style.fontFamily =fontType[num];
      }

      function setBgColor() {
        const color = [ "lightblue", "pink", "yellow", "white"]
        const num=Math.floor(Math.random()*4);
        document.getElementById("wrapper").style.backgroundColor =color[num];
      }

     setBgColor();
     setFont(); 
     showSnack();
</script> 
</body>
</html>
